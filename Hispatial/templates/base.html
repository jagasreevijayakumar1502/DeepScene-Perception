<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HiSpatial Environmental Perception Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">HiSpatial Dashboard</div>
            <nav>
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('image_analysis') }}">Image Analysis</a>
                <a href="{{ url_for('video_analysis') }}">Video Analysis</a>
                <a href="{{ url_for('live_camera') }}">Live Camera</a>
                <a href="{{ url_for('about') }}">About HiSpatial</a>
            </nav>
        </aside>
        <main class="content">
            <header class="topbar">
                <div class="topbar-title">HiSpatial Environmental Perception Dashboard</div>
                <div class="topbar-action">Research-grade AI scene understanding for images, video, and live camera.</div>
            </header>
            <section class="page-body">{% block content %}{% endblock %}</section>
        </main>
    </div>
</body>
</html>
